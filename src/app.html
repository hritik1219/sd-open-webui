<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link
			rel="icon"
			type="image/svg+xml"
			href="/static/favicon.svg"
			crossorigin="use-credentials"
		/>
		<link
			rel="icon"
			type="image/png"
			href="/static/favicon-96x96.png"
			sizes="96x96"
			crossorigin="use-credentials"
		/>
		<link
			rel="icon"
			type="image/svg+xml"
			href="/static/favicon.svg"
			crossorigin="use-credentials"
		/>
		<link rel="shortcut icon" href="/static/favicon.ico" crossorigin="use-credentials" />
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="/static/apple-touch-icon.png"
			crossorigin="use-credentials"
		/>
		<link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
		/>
		<meta name="theme-color" content="#FF2341" />
		<meta name="robots" content="noindex,nofollow" />

		<script src="/static/loader.js" defer crossorigin="use-credentials"></script>
		<link rel="stylesheet" href="/static/custom.css" crossorigin="use-credentials" />

		<script>
			function resizeIframe(obj) {
				obj.style.height = obj.contentWindow.document.documentElement.scrollHeight + 'px';
			}
		</script>

		<script>
			// On page load or when changing themes, best to add inline in `head` to avoid FOUC
			(() => {
				const metaThemeColorTag = document.querySelector('meta[name="theme-color"]');
				const prefersDarkTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;

				if (!localStorage?.theme) {
					localStorage.theme = 'snapdeal';
				}

				if (localStorage.theme === 'system') {
					document.documentElement.classList.add(prefersDarkTheme ? 'dark' : 'light');
					metaThemeColorTag.setAttribute('content', prefersDarkTheme ? '#171717' : '#ffffff');
				} else if (localStorage.theme === 'oled-dark') {
					document.documentElement.style.setProperty('--color-gray-800', '#101010');
					document.documentElement.style.setProperty('--color-gray-850', '#050505');
					document.documentElement.style.setProperty('--color-gray-900', '#000000');
					document.documentElement.style.setProperty('--color-gray-950', '#000000');
					document.documentElement.classList.add('dark');
					metaThemeColorTag.setAttribute('content', '#000000');
				} else if (localStorage.theme === 'light') {
					document.documentElement.classList.add('light');
					metaThemeColorTag.setAttribute('content', '#ffffff');
				} else if (localStorage.theme === 'her') {
					document.documentElement.classList.add('light');
					document.documentElement.classList.add('her');
					metaThemeColorTag.setAttribute('content', '#983724');
				} else if (localStorage.theme === 'snapdeal') {
					document.documentElement.classList.add('light');
					document.documentElement.classList.add('snapdeal');
					metaThemeColorTag.setAttribute('content', '#FF2341');
				} else {
					document.documentElement.classList.add('dark');
					metaThemeColorTag.setAttribute('content', '#171717');
				}

				window.matchMedia('(prefers-color-scheme: dark)').addListener((e) => {
					if (localStorage.theme === 'system') {
						if (e.matches) {
							document.documentElement.classList.add('dark');
							document.documentElement.classList.remove('light');
							metaThemeColorTag.setAttribute('content', '#171717');
						} else {
							document.documentElement.classList.add('light');
							document.documentElement.classList.remove('dark');
							metaThemeColorTag.setAttribute('content', '#ffffff');
						}
					}
				});
			})();
		</script>

		<title>Prism</title>

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>

		<div
			id="splash-screen"
			style="position: fixed; z-index: 100; top: 0; left: 0; width: 100%; height: 100%"
		>
			<style type="text/css" nonce="">
				html {
					overflow-y: scroll !important;
				}
			</style>

			<div
				style="
					position: absolute;
					top: 33%;
					left: 50%;

					width: 24rem;
					transform: translateX(-50%);

					display: flex;
					flex-direction: column;
					align-items: center;
				"
			>
				<div id="logo-prism">
					<svg
						xmlns="http://www.w3.org/2000/svg"
						width="48"
						height="48"
						viewBox="0 0 32 32"
						fill="none"
					>
						<path
							fill-rule="evenodd"
							clip-rule="evenodd"
							d="M8.15738 28.1934L2.89 18.8954C2.60878 18.4007 2.55767 18.036 2.78779 17.489L7.72255 5.32623C7.82505 5.06595 8.23418 5.01361 8.3875 5.27417L14.7801 16.5256C15.0613 17.0202 15.3682 17.2026 15.9307 17.2026H28.639C28.9202 17.2026 29.1247 17.5931 28.9459 17.8275L21.019 28.2454C20.661 28.7142 20.3544 28.8707 19.7916 28.8707H9.30798C8.74553 28.8707 8.43861 28.6883 8.15738 28.1934ZM21.3515 14.7544L18.9478 10.483H14.1152C13.5525 10.483 13.2458 10.3007 12.9646 9.80599L9.92165 4.44086C9.76833 4.15412 9.99845 3.76356 10.3051 3.76356H22.0164C22.5789 3.76356 22.8858 3.9459 23.167 4.44086L29.0226 14.7544C29.1759 15.0408 28.9458 15.4317 28.6388 15.4317H22.5021C21.9396 15.4317 21.6327 15.2493 21.3515 14.7544Z"
							fill="#FF2341"
						></path>
					</svg>

					<div id="logo-prism-wordmark">Prism</div>
				</div>

				<div style="position: relative; width: 24rem; margin-top: 0.5rem">
					<div
						id="progress-background"
						style="
							position: absolute;
							width: 100%;
							height: 0.75rem;

							border-radius: 9999px;
							background-color: #fafafa9a;
						"
					></div>

					<div
						id="progress-bar"
						style="
							position: absolute;
							width: 0%;
							height: 0.75rem;
							border-radius: 9999px;
							background-color: #fff;
						"
						class="bg-white"
					></div>
				</div>
			</div>

			<!-- <span style="position: absolute; bottom: 32px; left: 50%; margin: -36px 0 0 -36px">
				Footer content
			</span> -->
		</div>
	</body>

	<style type="text/css" nonce="">
		html {
			overflow-y: hidden !important;
			overscroll-behavior-y: none;
		}

		#splash-screen {
			background: #fff;
		}

		html.dark #splash-screen {
			background: #000;
		}

		html.her #splash-screen {
			background: #983724;
		}

		html.snapdeal #splash-screen {
			background: linear-gradient(180deg, #ffffff 0%, #fff4f6 100%);
		}

		#logo-prism {
			display: inline-flex;
			align-items: center;
			gap: 0.875rem;
			padding: 1rem 1.5rem;
			border-radius: 999px;
			background: #fff;
			border: 1px solid rgba(200, 200, 200, 0.7);
			box-shadow: 0 5px 24px rgba(28, 26, 26, 0.05);
		}

		#logo-prism > svg:first-child {
			width: 3rem;
			height: 3rem;
			flex-shrink: 0;
		}

		#logo-prism-wordmark {
			color: #333333;
			font-family: Archivo, sans-serif;
			font-size: 2.4rem;
			font-weight: 600;
			line-height: 1;
			letter-spacing: -0.03em;
		}

		#progress-background {
			display: none;
		}

		#progress-bar {
			display: none;
		}

		html.her #progress-background {
			display: block;
		}

		html.her #progress-bar {
			display: block;
		}

		@media (max-width: 24rem) {
			html.her #progress-background {
				display: none;
			}

			html.her #progress-bar {
				display: none;
			}

			#logo-prism {
				gap: 0.625rem;
				padding: 0.875rem 1rem;
			}

			#logo-prism > svg:first-child {
				width: 2.5rem;
				height: 2.5rem;
			}

			#logo-prism-wordmark {
				font-size: 1.8rem;
			}
		}

		@keyframes pulse {
			50% {
				opacity: 0.65;
			}
		}

		.animate-pulse-fast {
			animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
		}
	</style>
</html>
